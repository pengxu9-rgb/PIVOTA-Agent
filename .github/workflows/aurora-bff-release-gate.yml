name: Aurora BFF Release Gate

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL for runtime smoke (default: production)"
        required: false
        default: "https://pivota-agent-production.up.railway.app"
      wait_for_commit:
        description: "Wait for deployed X-Service-Commit to match this workflow's GITHUB_SHA"
        type: boolean
        required: false
        default: true

concurrency:
  group: aurora-bff-release-gate
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + Contract Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release source
        shell: bash
        env:
          EXPECTED_REPO_NAME: PIVOTA-Agent
          ALLOWED_BRANCH_REGEX: "^main$"
        run: |
          bash scripts/verify_release_source.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Test preflight
        run: npm run test:preflight

      - name: Reco guardrail gate (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          make reco-guardrail-eval

      - name: P0 compliance gates (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          make ingredient-kb-dry-run
          make ingredient-kb-audit
          make claims-audit

      - name: Aurora BFF unit tests (offline)
        run: npm run test:aurora-bff:unit

      - name: Replay quality gate (deterministic)
        run: npm run test:replay-quality

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest numpy pillow

      - name: E2E contract tests (offline)
        run: make test

      - name: Generate RELEASE_GATE.md
        run: make release-gate

      - name: Validate monitoring assets
        run: make monitoring-validate

      - name: Upload RELEASE_GATE.md
        uses: actions/upload-artifact@v4
        with:
          name: RELEASE_GATE
          path: RELEASE_GATE.md
          if-no-files-found: error

  runtime_smoke:
    name: Runtime Smoke (deployed)
    runs-on: ubuntu-latest
    needs: [unit]
    if: github.event_name != 'pull_request'
    env:
      BASE_URL: ${{ inputs.base_url || vars.AURORA_BFF_BASE_URL || 'https://pivota-agent-production.up.railway.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment to match commit (best-effort)
        if: github.event_name != 'workflow_dispatch' || inputs.wait_for_commit == true
        shell: bash
        run: |
          set -euo pipefail
          target="${GITHUB_SHA:0:12}"
          echo "BASE_URL=$BASE_URL"
          echo "target_commit=$target"

          deployed=""
          for i in {1..80}; do
            deployed="$(curl -sSI "$BASE_URL/v1/session/bootstrap" | tr -d '\r' | awk -F': ' 'tolower($1)=="x-service-commit" {print $2}' | head -n 1 || true)"
            echo "$i deployed_commit=${deployed:-missing}"
            if [[ -n "${deployed:-}" && "$deployed" == "$target" ]]; then
              echo "Deployment matches."
              exit 0
            fi
            sleep 10
          done

          echo "Timed out waiting for deployment to match commit. deployed=${deployed:-missing} target=$target"
          exit 1

      - name: Verify deployed commit via script (strict)
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="$BASE_URL" TARGET_COMMIT="${GITHUB_SHA:0:12}" bash scripts/verify_deployed_commit_matches.sh

      - name: Runtime smoke (hits BASE_URL)
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" bash scripts/smoke_aurora_bff_runtime.sh

      - name: Travel plans route smoke
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" bash scripts/smoke_travel_plans_runtime.sh

      - name: Skin reco gate smoke (artifact/safety branches)
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" bash scripts/smoke_aurora_skin_reco_gates.sh

      - name: Photo modules smoke (usable branch)
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" \
          LANG_HEADER=EN \
          EXPECT_BRANCH=usable \
          REPORT_OUT="reports/photo_modules_production_smoke_usable.md" \
          bash scripts/smoke_photo_modules_production.sh

      - name: Photo modules smoke (forced fail branch)
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" \
          LANG_HEADER=EN \
          EXPECT_BRANCH=fail \
          FORCE_QC_STATUS=fail \
          REPORT_OUT="reports/photo_modules_production_smoke_fail.md" \
          bash scripts/smoke_photo_modules_production.sh

      - name: Entry-route smoke (CN)
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" AURORA_LANG=CN CHECK_POSITIVE_TONE=true bash scripts/smoke_entry_routes.sh

      - name: Entry-route smoke (EN)
        shell: bash
        run: |
          set -euo pipefail
          BASE="$BASE_URL" AURORA_LANG=EN CHECK_POSITIVE_TONE=true bash scripts/smoke_entry_routes.sh

      - name: Chaos soak smoke (one-shot subset)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp/ci_chaos_soak_once
          # CI runs a deterministic one-shot subset (not full-duration soak) because runtime_smoke targets deployed env.
          BASE="$BASE_URL" \
          DURATION_SECONDS=60 \
          BASE_RPS=1 \
          CHAOS_RPS=1 \
          SPIKE_RPS=2 \
          TOXIPROXY_ENABLED=false \
          bash scripts/smoke_chaos_soak_aurora_skin.sh \
            --base "$BASE_URL" \
            --once \
            --scenario use_photo_false \
            --lang EN \
            --out tmp/ci_chaos_soak_once

      - name: Upload chaos soak summary
        uses: actions/upload-artifact@v4
        with:
          name: chaos-soak-once-summary
          path: |
            tmp/ci_chaos_soak_once/summary.json
            tmp/ci_chaos_soak_once/summary.csv
            tmp/ci_chaos_soak_once/run.log
          if-no-files-found: error

      - name: Auto rollback failed release (webhook)
        if: failure()
        shell: bash
        env:
          ROLLBACK_WEBHOOK_URL: ${{ secrets.RAILWAY_ROLLBACK_WEBHOOK_URL }}
          ROLLBACK_REASON: aurora_bff_release_gate_failed
          FAILED_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          bash scripts/trigger_rollback_webhook.sh
