name: Celestial Commerce Core Readiness

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL for commerce-core smoke"
        required: false
        default: "https://agent.pivota.cc"
      backend_public_base_url:
        description: "Backend public base URL for version probing"
        required: false
        default: "https://web-production-fedb.up.railway.app"
      wait_for_commit:
        description: "Wait for deployed agent commit before running production smoke"
        type: boolean
        required: false
        default: true
  push:
    branches:
      - main
    paths:
      - ".github/workflows/celestial-commerce-core-readiness.yml"
      - "package.json"
      - "docs/runbooks/celestial_commerce_core_actual_architecture.md"
      - "docs/runbooks/celestial_commerce_core_readiness.md"
      - "docs/runbooks/celestial_commerce_core_prod_canary.md"
      - "docs/runbooks/celestial_commerce_core_stabilization_acceptance.md"
      - "docs/runbooks/celestial_commerce_core_source_contracts.md"
      - "docs/runbooks/commerce_prod_invoke_contract_audit.md"
      - "docs/runbooks/commerce_invoke_rail_matrix.md"
      - "docs/runbooks/pivota_gateway_invocation_access_governance.md"
      - "docs/runbooks/llm_agent_infrastructure_readiness.md"
      - "scripts/run_celestial_commerce_core_readiness_audit.sh"
      - "scripts/run_celestial_commerce_core_stabilization_acceptance.sh"
      - "scripts/run_celestial_commerce_core_staging_matrix.js"
      - "scripts/probe_celestial_commerce_core_prod_canary.sh"
      - "scripts/generate_celestial_commerce_core_stabilization_report.js"
      - "scripts/smoke_celestial_commerce_core_prod.sh"
      - "scripts/search_stability_matrix.js"
      - "scripts/extract_gateway_governance_shadow_sample.js"
      - "scripts/extract_celestial_commerce_gateway_governance_shadow_from_search_matrix.js"
      - "scripts/fetch_celestial_commerce_gateway_governance_logs.js"
      - "scripts/evaluate_celestial_commerce_gateway_governance_alerts.js"
      - "scripts/evaluate_celestial_commerce_main_path_alerts.js"
      - "scripts/run_gateway_governance_daily_summary.sh"
      - "scripts/generate_celestial_commerce_gateway_governance_report.js"
      - "scripts/verify_celestial_commerce_core_boundaries.js"
      - "scripts/verify_deployed_commit_matches.sh"
      - "scripts/verify_commerce_invoke_rails.js"
      - "scripts/lib/**"
      - "scripts/fixtures/celestial_commerce_core_prod_gate.json"
      - "scripts/fixtures/celestial_commerce_core_prod_canary.json"
      - "scripts/fixtures/celestial_commerce_core_prompt_live_smoke.json"
      - "scripts/fixtures/celestial_commerce_core_shared_acceptance_corpus.json"
      - "scripts/fixtures/celestial_commerce_core_staging_acceptance_matrix.json"
      - "scripts/fixtures/commerce_invoke_rail_inventory.json"
      - "scripts/fixtures/celestial_commerce_core_stabilization_snapshot.json"
      - "scripts/fixtures/celestial_commerce_core_milestone0_baseline.json"
      - "scripts/fixtures/celestial_commerce_gateway_governance_alert_thresholds.json"
      - "scripts/fixtures/celestial_commerce_main_path_alert_thresholds.json"
      - "scripts/fixtures/celestial_commerce_gateway_governance_baseline.json"
      - "scripts/fixtures/celestial_commerce_gateway_governance_raw_log_sample.ndjson"
      - "scripts/fixtures/celestial_commerce_gateway_governance_shadow_runtime_sample.ndjson"
      - "src/api/gateway/**"
      - "src/modules/**"
      - "src/server.js"
      - "src/auroraBff/routes/chat.js"
      - "src/auroraBff/routes.js"
      - "tests/celestial_commerce_core_contracts.test.js"
      - "tests/aurora_commerce_core_contracts.test.js"
      - "tests/celestial_commerce_core_layer_dispatch.test.js"
      - "tests/celestial_commerce_core_shopping_context.test.js"
      - "tests/celestial_commerce_core_source_policy.test.js"
      - "tests/celestial_commerce_gateway_invocation_contracts.test.js"
      - "tests/celestial_commerce_gateway_access_governance.test.js"
      - "tests/celestial_commerce_gateway_boundary.test.js"
      - "tests/celestial_commerce_gateway_ingress_invocation.test.js"
      - "tests/invoke_gateway_shadow_audit.test.js"
      - "tests/celestial_commerce_gateway_shadow_summary.test.js"
      - "tests/celestial_commerce_gateway_governance_report_script.test.js"
      - "tests/celestial_commerce_gateway_shadow_sample_extract_script.test.js"
      - "tests/celestial_commerce_gateway_shadow_from_search_matrix_script.test.js"
      - "tests/celestial_commerce_gateway_governance_fetch_script.test.js"
      - "tests/celestial_commerce_gateway_governance_alerts_script.test.js"
      - "tests/celestial_commerce_gateway_daily_summary_script.test.js"
      - "tests/celestial_commerce_main_path_alerts_script.test.js"
      - "tests/celestial_commerce_core_staging_matrix_script.test.js"
      - "tests/celestial_commerce_core_stabilization_report_script.test.js"
      - "tests/celestial_commerce_core_prod_canary_script.test.js"
      - "tests/aurora_chat_rollout_headers.node.test.cjs"
      - "tests/commerce_invoke_rail_inventory.test.js"
      - "tests/commerce_primary_path_contract.test.js"
      - "tests/shopping_agent_loop_break.test.js"
      - "tests/shopping_agent_guidance_context.test.js"
      - "tests/shopping_agent_guidance_retrieval_plan.test.js"
      - "tests/shopping_agent_guidance_fastpath.test.js"
      - "tests/shopping_agent_guidance_ladder_outcome.test.js"
      - "tests/integration/invoke.find_products_multi_cache_search.test.js"
      - "tests/integration/invoke.find_products_multi_strict_surface.test.js"

concurrency:
  group: celestial-commerce-core-readiness
  cancel-in-progress: true

jobs:
  local_contracts:
    name: Celestial Commerce Core Local Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify release source
        shell: bash
        env:
          EXPECTED_REPO_NAME: PIVOTA-Agent
          ALLOWED_BRANCH_REGEX: "^main$"
        run: |
          bash scripts/verify_release_source.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Static checks
        shell: bash
        run: |
          set -euo pipefail
          node --check src/server.js
          node --check src/auroraBff/routes/chat.js
          node --check scripts/search_stability_matrix.js
          node --check scripts/run_celestial_commerce_core_staging_matrix.js
          node --check scripts/generate_celestial_commerce_core_stabilization_report.js
          node --check scripts/extract_celestial_commerce_gateway_governance_shadow_from_search_matrix.js
          node --check scripts/fetch_celestial_commerce_gateway_governance_logs.js
          node --check scripts/evaluate_celestial_commerce_main_path_alerts.js
          node scripts/verify_commerce_invoke_rails.js
          node scripts/verify_celestial_commerce_core_boundaries.js
          bash -n scripts/smoke_celestial_commerce_core_prod.sh
          bash -n scripts/probe_celestial_commerce_core_prod_canary.sh
          bash -n scripts/run_celestial_commerce_core_readiness_audit.sh
          bash -n scripts/run_celestial_commerce_core_stabilization_acceptance.sh

      - name: Commerce core gates
        run: |
          npx jest --runInBand \
            tests/celestial_commerce_core_contracts.test.js \
            tests/aurora_commerce_core_contracts.test.js \
            tests/celestial_commerce_core_layer_dispatch.test.js \
            tests/celestial_commerce_core_shopping_context.test.js \
            tests/celestial_commerce_core_source_policy.test.js \
            tests/celestial_commerce_gateway_invocation_contracts.test.js \
            tests/celestial_commerce_gateway_access_governance.test.js \
            tests/celestial_commerce_gateway_boundary.test.js \
            tests/celestial_commerce_gateway_ingress_invocation.test.js \
            tests/invoke_gateway_shadow_audit.test.js \
            tests/celestial_commerce_gateway_shadow_summary.test.js \
            tests/celestial_commerce_gateway_governance_report_script.test.js \
            tests/celestial_commerce_gateway_shadow_sample_extract_script.test.js \
            tests/celestial_commerce_gateway_shadow_from_search_matrix_script.test.js \
            tests/celestial_commerce_gateway_governance_fetch_script.test.js \
            tests/celestial_commerce_gateway_governance_alerts_script.test.js \
            tests/celestial_commerce_gateway_daily_summary_script.test.js \
            tests/celestial_commerce_main_path_alerts_script.test.js \
            tests/celestial_commerce_core_staging_matrix_script.test.js \
            tests/celestial_commerce_core_stabilization_report_script.test.js \
            tests/celestial_commerce_core_prod_canary_script.test.js \
            tests/aurora_chat_rollout_headers.node.test.cjs \
            tests/commerce_invoke_rail_inventory.test.js \
            tests/commerce_primary_path_contract.test.js \
            tests/shopping_agent_loop_break.test.js \
            tests/shopping_agent_guidance_context.test.js \
            tests/shopping_agent_guidance_retrieval_plan.test.js \
            tests/shopping_agent_guidance_fastpath.test.js \
            tests/shopping_agent_guidance_ladder_outcome.test.js \
            tests/integration/invoke.find_products_multi_cache_search.test.js \
            tests/integration/invoke.find_products_multi_strict_surface.test.js

  readiness_audit:
    name: Celestial Commerce Core Readiness Audit
    runs-on: ubuntu-latest
    needs: [local_contracts]
    timeout-minutes: 30
    env:
      BASE_URL: ${{ inputs.base_url || vars.PIVOTA_AGENT_PUBLIC_BASE_URL || vars.AGENT_PUBLIC_BASE_URL || 'https://agent.pivota.cc' }}
      BACKEND_PUBLIC_BASE_URL: ${{ inputs.backend_public_base_url || vars.PIVOTA_BACKEND_PUBLIC_BASE_URL || 'https://web-production-fedb.up.railway.app' }}
      COMMERCE_CORE_PROD_SMOKE_BASE_URL: ${{ vars.PIVOTA_AGENT_PROD_INVOKE_BASE_URL || vars.COMMERCE_CORE_PROD_SMOKE_BASE_URL || 'https://pivota-agent-production.up.railway.app' }}
      COMMERCE_CORE_PROD_SMOKE_ENDPOINT: /agent/shop/v1/invoke
      COMMERCE_CORE_PROD_AUTH_TOKEN: ${{ secrets.COMMERCE_CORE_PROD_AUTH_TOKEN || secrets.PIVOTA_AGENT_PROD_AUTH_TOKEN || '' }}
      COMMERCE_CORE_PROD_AGENT_API_KEY: ${{ secrets.COMMERCE_CORE_PROD_AGENT_API_KEY || secrets.PIVOTA_AGENT_PROD_AGENT_API_KEY || '' }}
      COMMERCE_CORE_PROMPT_SMOKE_BASE_URL: ${{ vars.PIVOTA_AGENT_PROD_INVOKE_BASE_URL || vars.COMMERCE_CORE_PROD_SMOKE_BASE_URL || 'https://pivota-agent-production.up.railway.app' }}
      COMMERCE_CORE_PROMPT_SMOKE_ENDPOINT: /v1/chat
      COMMERCE_CORE_PROMPT_AUTH_TOKEN: ${{ secrets.COMMERCE_CORE_PROMPT_AUTH_TOKEN || secrets.COMMERCE_CORE_PROD_AUTH_TOKEN || secrets.PIVOTA_AGENT_PROD_AUTH_TOKEN || '' }}
      COMMERCE_CORE_PROMPT_AGENT_API_KEY: ${{ secrets.COMMERCE_CORE_PROMPT_AGENT_API_KEY || secrets.COMMERCE_CORE_PROD_AGENT_API_KEY || secrets.PIVOTA_AGENT_PROD_AGENT_API_KEY || '' }}
      COMMERCE_CORE_PROMPT_TIMEOUT_MS: ${{ vars.COMMERCE_CORE_PROMPT_TIMEOUT_MS || '25000' }}
      COMMERCE_CORE_PROMPT_RETRIES: ${{ vars.COMMERCE_CORE_PROMPT_RETRIES || '1' }}
      RAILWAY_API_TOKEN: ${{ secrets.GATEWAY_GOVERNANCE_RAILWAY_API_TOKEN || secrets.PIVOTA_AGENT_RAILWAY_API_TOKEN || secrets.RAILWAY_API_TOKEN || '' }}
      RAILWAY_TOKEN: ${{ secrets.GATEWAY_GOVERNANCE_RAILWAY_API_TOKEN || secrets.PIVOTA_AGENT_RAILWAY_API_TOKEN || secrets.RAILWAY_API_TOKEN || '' }}
      GATEWAY_GOVERNANCE_AUTO_FETCH: ${{ (secrets.GATEWAY_GOVERNANCE_RAILWAY_API_TOKEN || secrets.PIVOTA_AGENT_RAILWAY_API_TOKEN || secrets.RAILWAY_API_TOKEN) != '' && '1' || '0' }}
      GATEWAY_GOVERNANCE_RAILWAY_PROJECT: ${{ vars.GATEWAY_GOVERNANCE_RAILWAY_PROJECT || 'Pivota Agent' }}
      GATEWAY_GOVERNANCE_RAILWAY_ENVIRONMENT: ${{ vars.GATEWAY_GOVERNANCE_RAILWAY_ENVIRONMENT || 'production' }}
      GATEWAY_GOVERNANCE_RAILWAY_SERVICE: ${{ vars.GATEWAY_GOVERNANCE_RAILWAY_SERVICE || 'PIVOTA-Agent' }}
      GATEWAY_GOVERNANCE_RAILWAY_WORKSPACE: ${{ vars.GATEWAY_GOVERNANCE_RAILWAY_WORKSPACE || '' }}
      GATEWAY_GOVERNANCE_FETCH_LINES: ${{ vars.GATEWAY_GOVERNANCE_FETCH_LINES || '500' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.35.0

      - name: Verify deployed commit via service_version
        if: github.event_name != 'workflow_dispatch' || inputs.wait_for_commit == true
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="$BASE_URL" \
          INVOKE_BASE_URL="$COMMERCE_CORE_PROD_SMOKE_BASE_URL" \
          AUTH_TOKEN="$COMMERCE_CORE_PROD_AUTH_TOKEN" \
          AGENT_API_KEY="$COMMERCE_CORE_PROD_AGENT_API_KEY" \
          GATEWAY_ENDPOINT="" \
          ALT_GATEWAY_ENDPOINT="$COMMERCE_CORE_PROD_SMOKE_ENDPOINT" \
          TARGET_COMMIT="${GITHUB_SHA:0:12}" \
          bash scripts/verify_deployed_commit_matches.sh

      - name: Run commerce-core readiness audit
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="$BASE_URL" \
          BACKEND_PUBLIC_BASE_URL="$BACKEND_PUBLIC_BASE_URL" \
          COMMERCE_CORE_PROD_SMOKE_BASE_URL="$COMMERCE_CORE_PROD_SMOKE_BASE_URL" \
          COMMERCE_CORE_PROD_SMOKE_ENDPOINT="$COMMERCE_CORE_PROD_SMOKE_ENDPOINT" \
          COMMERCE_CORE_PROD_AUTH_TOKEN="$COMMERCE_CORE_PROD_AUTH_TOKEN" \
          COMMERCE_CORE_PROD_AGENT_API_KEY="$COMMERCE_CORE_PROD_AGENT_API_KEY" \
          COMMERCE_CORE_PROMPT_SMOKE_BASE_URL="$COMMERCE_CORE_PROMPT_SMOKE_BASE_URL" \
          COMMERCE_CORE_PROMPT_SMOKE_ENDPOINT="$COMMERCE_CORE_PROMPT_SMOKE_ENDPOINT" \
          GATEWAY_GOVERNANCE_AUTO_FETCH="$GATEWAY_GOVERNANCE_AUTO_FETCH" \
          GATEWAY_GOVERNANCE_RAILWAY_PROJECT="$GATEWAY_GOVERNANCE_RAILWAY_PROJECT" \
          GATEWAY_GOVERNANCE_RAILWAY_ENVIRONMENT="$GATEWAY_GOVERNANCE_RAILWAY_ENVIRONMENT" \
          GATEWAY_GOVERNANCE_RAILWAY_SERVICE="$GATEWAY_GOVERNANCE_RAILWAY_SERVICE" \
          GATEWAY_GOVERNANCE_RAILWAY_WORKSPACE="$GATEWAY_GOVERNANCE_RAILWAY_WORKSPACE" \
          GATEWAY_GOVERNANCE_FETCH_LINES="$GATEWAY_GOVERNANCE_FETCH_LINES" \
          OUT_DIR="reports/celestial-commerce-core-readiness-ci" \
          bash scripts/run_celestial_commerce_core_readiness_audit.sh

      - name: Upload readiness reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: celestial-commerce-core-readiness
          path: reports/celestial-commerce-core-readiness-ci
          if-no-files-found: error
