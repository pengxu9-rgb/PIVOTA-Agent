name: External Seed PDP Quality Audit

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Market code"
        required: true
        default: "US"
        type: string
      domain:
        description: "Optional exact seed domain"
        required: false
        default: ""
        type: string
      brand:
        description: "Optional exact seed brand"
        required: false
        default: ""
        type: string
      external_product_id:
        description: "Optional single external_product_id"
        required: false
        default: ""
        type: string
      limit:
        description: "Rows to scan"
        required: true
        default: "100"
        type: string
      offset:
        description: "Row offset"
        required: true
        default: "0"
        type: string
      skip_similar:
        description: "Skip similar probe"
        required: true
        default: false
        type: boolean
      concurrency:
        description: "Live PDP probe concurrency"
        required: true
        default: "4"
        type: string

jobs:
  pdp-quality-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: Pivota Agent / production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PIVOTA_BACKEND_AGENT_API_KEY: ${{ secrets.PIVOTA_BACKEND_AGENT_API_KEY }}
      SHOP_GATEWAY_AGENT_API_KEY: ${{ secrets.SHOP_GATEWAY_AGENT_API_KEY }}
      PIVOTA_AGENT_API_KEY: ${{ secrets.PIVOTA_AGENT_API_KEY }}
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
      CATALOG_INTELLIGENCE_BASE_URL: ${{ secrets.CATALOG_INTELLIGENCE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run PDP quality audit
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "DATABASE_URL secret is required" >&2
            exit 1
          fi

          out_dir="reports/workflow_ops/external-seed-pdp-quality-audit/${{ github.run_id }}"
          mkdir -p "${out_dir}"

          args=(
            --market "${{ inputs.market }}"
            --limit "${{ inputs.limit }}"
            --offset "${{ inputs.offset }}"
            --concurrency "${{ inputs.concurrency }}"
            --out "${out_dir}/report.json"
          )
          if [[ -n "${{ inputs.domain }}" ]]; then
            args+=(--domain "${{ inputs.domain }}")
          fi
          if [[ -n "${{ inputs.brand }}" ]]; then
            args+=(--brand "${{ inputs.brand }}")
          fi
          if [[ -n "${{ inputs.external_product_id }}" ]]; then
            args+=(--external-product-id "${{ inputs.external_product_id }}")
          fi
          if [[ "${{ inputs.skip_similar }}" == "true" ]]; then
            args+=(--skip-similar)
          fi
          node scripts/audit-external-seed-live-pdp-modules.cjs "${args[@]}" \
            | tee "${out_dir}/summary.json"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-seed-pdp-quality-audit-${{ github.run_id }}
          path: reports/workflow_ops/external-seed-pdp-quality-audit/${{ github.run_id }}
          retention-days: 7
