name: Production Deploy Promote

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

concurrency:
  group: production-deploy-promote
  cancel-in-progress: true

jobs:
  trigger-production-deploy:
    name: Trigger Production Deploy From GitHub Main
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROD_DEPLOY_WEBHOOK_URL: ${{ secrets.RAILWAY_PRODUCTION_DEPLOY_WEBHOOK_URL || secrets.PIVOTA_AGENT_PROD_DEPLOY_WEBHOOK_URL || secrets.RAILWAY_DEPLOY_WEBHOOK_URL || '' }}
      PROD_SMOKE_BASE_URL: ${{ vars.PIVOTA_AGENT_PROD_INVOKE_BASE_URL || vars.COMMERCE_CORE_PROD_SMOKE_BASE_URL || 'https://pivota-agent-production.up.railway.app' }}
      RAILWAY_PROJECT_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN || '' }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || '885d576d-ad16-493d-90d2-8cbdbe0aedee' }}
      RAILWAY_PRODUCTION_ENVIRONMENT_ID: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID || '50b12806-ab68-4265-aa0e-23af0b0d2426' }}
      RAILWAY_PIVOTA_AGENT_SERVICE_ID: ${{ vars.RAILWAY_PIVOTA_AGENT_SERVICE_ID || 'eb5a15d3-9447-4b82-882a-49a956d09158' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Detect production deploy owner
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${PROD_DEPLOY_WEBHOOK_URL}" ]]; then
            echo "Production deploy webhook configured."
          elif [[ -n "${RAILWAY_PROJECT_TOKEN}" ]]; then
            echo "Railway project token configured; production deploy will be triggered through Railway GraphQL."
          else
            echo "::notice::No explicit production deploy trigger configured. Falling back to direct GitHub-linked production deploy detection."
          fi

      - name: Trigger production deploy webhook
        if: env.PROD_DEPLOY_WEBHOOK_URL != ''
        shell: bash
        env:
          DEPLOY_WEBHOOK_URL: ${{ env.PROD_DEPLOY_WEBHOOK_URL }}
          DEPLOY_REASON: github_push_main_promote
          TARGET_SHA: ${{ github.sha }}
          TARGET_REF: ${{ github.ref }}
          TARGET_REPOSITORY: ${{ github.repository }}
          TRIGGER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          bash scripts/trigger_deploy_webhook.sh

      - name: Trigger Railway production deploy via project token
        if: env.PROD_DEPLOY_WEBHOOK_URL == '' && env.RAILWAY_PROJECT_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const required = [
            'RAILWAY_PROJECT_TOKEN',
            'RAILWAY_PROJECT_ID',
            'RAILWAY_PRODUCTION_ENVIRONMENT_ID',
            'RAILWAY_PIVOTA_AGENT_SERVICE_ID',
          ];
          for (const key of required) {
            if (!String(process.env[key] || '').trim()) {
              throw new Error(`${key} is required`);
            }
          }

          const response = await fetch('https://backboard.railway.app/graphql/v2', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Project-Access-Token': process.env.RAILWAY_PROJECT_TOKEN,
            },
            body: JSON.stringify({
              query: `mutation TriggerProductionDeploy($input: EnvironmentTriggersDeployInput!) {
                environmentTriggersDeploy(input: $input)
              }`,
              variables: {
                input: {
                  projectId: process.env.RAILWAY_PROJECT_ID,
                  environmentId: process.env.RAILWAY_PRODUCTION_ENVIRONMENT_ID,
                  serviceId: process.env.RAILWAY_PIVOTA_AGENT_SERVICE_ID,
                },
              },
            }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || payload.errors) {
            const message = payload.errors ? JSON.stringify(payload.errors) : JSON.stringify(payload);
            throw new Error(`Railway deploy trigger failed: ${response.status} ${message}`);
          }
          if (payload?.data?.environmentTriggersDeploy !== true) {
            throw new Error(`Railway deploy trigger returned unexpected response: ${JSON.stringify(payload)}`);
          }
          console.log('Railway production deploy triggered from GitHub Actions.');
          NODE

      - name: Verify deployed commit via /version
        shell: bash
        run: |
          set -euo pipefail
          INVOKE_BASE_URL="$PROD_SMOKE_BASE_URL" \
          TARGET_COMMIT="${GITHUB_SHA:0:12}" \
          MAX_ATTEMPTS=72 \
          SLEEP_SECONDS=10 \
          bash scripts/verify_deployed_commit_matches.sh

      - name: Photo backend contract canary
        id: photo_backend_contract_canary
        continue-on-error: true
        shell: bash
        env:
          BASE: ${{ env.PROD_SMOKE_BASE_URL }}
          BACKEND_BASE: ${{ vars.PIVOTA_BACKEND_PUBLIC_BASE_URL || 'https://web-production-fedb.up.railway.app' }}
          AGENT_API_KEY: ${{ secrets.COMMERCE_CORE_PROD_AGENT_API_KEY || secrets.PIVOTA_AGENT_PROD_AGENT_API_KEY || secrets.PIVOTA_PRODUCTION_AGENT_API_KEY || secrets.PROD_AGENT_API_KEY || secrets.AGENT_API_KEY || '' }}
          LANG_HEADER: CN
        run: |
          set -euo pipefail
          npm run probe:photo-contract:prod -- --timeout-ms 180000

      - name: Report photo backend canary drift
        if: steps.photo_backend_contract_canary.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Photo backend contract canary failed after deploy verification. Production deploy stayed promoted; investigate scripts/photo_backend_contract_canary.cjs and backend /photos upstream separately."
