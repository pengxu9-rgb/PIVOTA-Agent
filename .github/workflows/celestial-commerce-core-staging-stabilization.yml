name: Celestial Commerce Core Staging Stabilization

on:
  workflow_dispatch:
    inputs:
      staging_base_url:
        description: "Base URL for staging invoke acceptance"
        required: false
        default: "https://pivota-agent-staging.up.railway.app"
      timeout_ms:
        description: "Per-request timeout for staging invoke cases"
        required: false
        default: "15000"
      wait_for_commit:
        description: "Wait for deployed staging commit before running acceptance"
        type: boolean
        required: false
        default: true
      run_staging_matrix:
        description: "Run the full staging matrix during stabilization"
        type: boolean
        required: false
        default: true

concurrency:
  group: celestial-commerce-core-staging-stabilization
  cancel-in-progress: true

jobs:
  staging_stabilization:
    name: Celestial Commerce Core Staging Stabilization
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BASE_URL: ${{ vars.PIVOTA_AGENT_PUBLIC_BASE_URL || vars.AGENT_PUBLIC_BASE_URL || 'https://agent.pivota.cc' }}
      BACKEND_PUBLIC_BASE_URL: ${{ vars.PIVOTA_BACKEND_PUBLIC_BASE_URL || 'https://web-production-fedb.up.railway.app' }}
      STAGING_BASE_URL: ${{ inputs.staging_base_url || vars.PIVOTA_AGENT_STAGING_BASE_URL || vars.CELESTIAL_COMMERCE_STAGING_BASE_URL || 'https://pivota-agent-staging.up.railway.app' }}
      STAGING_TIMEOUT_MS: ${{ inputs.timeout_ms || '15000' }}
      RUN_STAGING_MATRIX: ${{ inputs.run_staging_matrix && '1' || '0' }}
      CELESTIAL_COMMERCE_STAGING_RAIL_MODE: authoritative_commerce
      COMMERCE_CORE_PROD_SMOKE_BASE_URL: ${{ vars.PIVOTA_AGENT_PROD_INVOKE_BASE_URL || vars.COMMERCE_CORE_PROD_SMOKE_BASE_URL || 'https://pivota-agent-production.up.railway.app' }}
      COMMERCE_CORE_PROD_SMOKE_ENDPOINT: /agent/shop/v1/invoke
      COMMERCE_CORE_PROD_AUTH_TOKEN: ${{ secrets.COMMERCE_CORE_PROD_AUTH_TOKEN || secrets.PIVOTA_AGENT_PROD_AUTH_TOKEN || '' }}
      COMMERCE_CORE_PROD_AGENT_API_KEY: ${{ secrets.COMMERCE_CORE_PROD_AGENT_API_KEY || secrets.PIVOTA_AGENT_PROD_AGENT_API_KEY || '' }}
      STAGING_AUTH_TOKEN: ${{ secrets.STAGING_AUTH_TOKEN || secrets.CELESTIAL_COMMERCE_STAGING_AUTH_TOKEN || secrets.STAGING_PUBLIC_AUTH_TOKEN || secrets.CELESTIAL_COMMERCE_STAGING_PUBLIC_AUTH_TOKEN || '' }}
      STAGING_AGENT_API_KEY: ${{ secrets.STAGING_AGENT_API_KEY || secrets.CELESTIAL_COMMERCE_STAGING_AGENT_API_KEY || secrets.STAGING_PUBLIC_AGENT_API_KEY || secrets.CELESTIAL_COMMERCE_STAGING_PUBLIC_AGENT_API_KEY || '' }}
      STAGING_PUBLIC_AUTH_TOKEN: ${{ secrets.STAGING_PUBLIC_AUTH_TOKEN || secrets.CELESTIAL_COMMERCE_STAGING_PUBLIC_AUTH_TOKEN || secrets.STAGING_AUTH_TOKEN || secrets.CELESTIAL_COMMERCE_STAGING_AUTH_TOKEN || '' }}
      STAGING_PUBLIC_AGENT_API_KEY: ${{ secrets.STAGING_PUBLIC_AGENT_API_KEY || secrets.CELESTIAL_COMMERCE_STAGING_PUBLIC_AGENT_API_KEY || secrets.STAGING_AGENT_API_KEY || secrets.CELESTIAL_COMMERCE_STAGING_AGENT_API_KEY || '' }}
      STAGING_GENERIC_MCP_AUTH_TOKEN: ${{ secrets.STAGING_GENERIC_MCP_AUTH_TOKEN || secrets.CELESTIAL_COMMERCE_STAGING_GENERIC_MCP_AUTH_TOKEN || secrets.STAGING_AUTH_TOKEN || secrets.CELESTIAL_COMMERCE_STAGING_AUTH_TOKEN || '' }}
      STAGING_GENERIC_MCP_AGENT_API_KEY: ${{ secrets.STAGING_GENERIC_MCP_AGENT_API_KEY || secrets.CELESTIAL_COMMERCE_STAGING_GENERIC_MCP_AGENT_API_KEY || secrets.STAGING_AGENT_API_KEY || secrets.CELESTIAL_COMMERCE_STAGING_AGENT_API_KEY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release source
        shell: bash
        env:
          EXPECTED_REPO_NAME: PIVOTA-Agent
          ALLOWED_BRANCH_REGEX: "^main$|^wt/s2-domain-condenser$"
        run: |
          bash scripts/verify_release_source.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Assert staging auth profiles configured
        run: |
          node scripts/assert_celestial_staging_auth_profiles.js

      - name: Verify staging deployed commit via service_version
        if: inputs.wait_for_commit == true
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="$BASE_URL" \
          INVOKE_BASE_URL="$STAGING_BASE_URL" \
          AUTH_TOKEN="$STAGING_AUTH_TOKEN" \
          AGENT_API_KEY="$STAGING_AGENT_API_KEY" \
          GATEWAY_ENDPOINT="" \
          ALT_GATEWAY_ENDPOINT="/agent/shop/v1/invoke" \
          ALLOW_HEADER_FALLBACK=0 \
          TARGET_COMMIT="${GITHUB_SHA:0:12}" \
          MAX_ATTEMPTS=80 \
          SLEEP_SECONDS=10 \
          bash scripts/verify_deployed_commit_matches.sh

      - name: Run narrow staging invoke smoke
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="$STAGING_BASE_URL" \
          OUT_DIR="reports/celestial-commerce-core-staging-stabilization-ci/staging_invoke_smoke" \
          TIMEOUT_MS="$STAGING_TIMEOUT_MS" \
          RAIL_MODE="authoritative_commerce" \
          bash scripts/smoke_celestial_commerce_core_staging_invoke.sh

      - name: Warm staging broad commerce runtime
        shell: bash
        run: |
          set -euo pipefail
          AUTH_TOKEN="$STAGING_AUTH_TOKEN" \
          AGENT_API_KEY="$STAGING_AGENT_API_KEY" \
          node scripts/warm_find_products_multi_runtime.js \
            --base-url "$STAGING_BASE_URL" \
            --endpoint "/agent/shop/v1/invoke" \
            --auth-token "$STAGING_AUTH_TOKEN" \
            --agent-api-key "$STAGING_AGENT_API_KEY" \
            --query serum \
            --source shopping_agent \
            --attempts 2 \
            --delay-ms 3000 \
            --timeout-ms 25000
          AUTH_TOKEN="$STAGING_AUTH_TOKEN" \
          AGENT_API_KEY="$STAGING_AGENT_API_KEY" \
          node scripts/warm_find_products_multi_runtime.js \
            --base-url "$STAGING_BASE_URL" \
            --endpoint "/agent/shop/v1/invoke" \
            --auth-token "$STAGING_AUTH_TOKEN" \
            --agent-api-key "$STAGING_AGENT_API_KEY" \
            --query serum \
            --source aurora-bff \
            --attempts 2 \
            --delay-ms 3000 \
            --timeout-ms 25000

      - name: Run full staging stabilization acceptance
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="$BASE_URL" \
          BACKEND_PUBLIC_BASE_URL="$BACKEND_PUBLIC_BASE_URL" \
          STAGING_BASE_URL="$STAGING_BASE_URL" \
          STAGING_TIMEOUT_MS="$STAGING_TIMEOUT_MS" \
          RUN_STAGING_MATRIX="$RUN_STAGING_MATRIX" \
          COMMERCE_CORE_PROD_SMOKE_BASE_URL="$COMMERCE_CORE_PROD_SMOKE_BASE_URL" \
          COMMERCE_CORE_PROD_SMOKE_ENDPOINT="$COMMERCE_CORE_PROD_SMOKE_ENDPOINT" \
          COMMERCE_CORE_PROD_AUTH_TOKEN="$COMMERCE_CORE_PROD_AUTH_TOKEN" \
          COMMERCE_CORE_PROD_AGENT_API_KEY="$COMMERCE_CORE_PROD_AGENT_API_KEY" \
          OUT_DIR="reports/celestial-commerce-core-staging-stabilization-ci" \
          bash scripts/run_celestial_commerce_core_stabilization_acceptance.sh

      - name: Fail when stabilization decision is NO-GO
        if: ${{ always() && hashFiles('reports/celestial-commerce-core-staging-stabilization-ci/*/summary.json') != '' }}
        run: |
          node scripts/assert_celestial_stabilization_decision.js \
            --report-root reports/celestial-commerce-core-staging-stabilization-ci \
            --fail-on no-go

      - name: Upload staging stabilization artifacts
        if: ${{ always() && hashFiles('reports/celestial-commerce-core-staging-stabilization-ci/**') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: celestial-commerce-core-staging-stabilization
          path: reports/celestial-commerce-core-staging-stabilization-ci
          if-no-files-found: warn
